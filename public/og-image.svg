<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c4da2"/>
  
  <!-- Gradient overlay -->
  <rect width="1200" height="630" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09356b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c4da2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Large Logo Circle -->
  <circle cx="300" cy="315" r="120" fill="#09356b" opacity="0.4"/>
  <circle cx="300" cy="315" r="110" fill="#0c4da2"/>
  
  <!-- Logo IID Text -->
  <text x="300" y="340" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    IID
  </text>
  
  <!-- Logo Accents -->
  <path d="M 300,220 L 310,235 L 290,235 Z" fill="#BF9A2D"/>
  <path d="M 300,410 L 310,395 L 290,395 Z" fill="#BF9A2D"/>
  <circle cx="200" cy="315" r="8" fill="#BF9A2D"/>
  <circle cx="400" cy="315" r="8" fill="#BF9A2D"/>
  
  <!-- Main Text -->
  <text x="650" y="260" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF" text-anchor="start">
    Ijebu Igbo
  </text>
  <text x="650" y="330" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF" text-anchor="start">
    Descendants
  </text>
  <text x="650" y="400" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#BF9A2D" text-anchor="start">
    in Diaspora
  </text>
  
  <!-- Tagline -->
  <text x="650" y="480" font-family="Arial, sans-serif" font-size="28" fill="#FFFFFF" opacity="0.8" text-anchor="start">
    Ẹ̀ wẹ̀ sọ̀ọ́ Ọmọ Alárè
  </text>
  <text x="650" y="520" font-family="Arial, sans-serif" font-size="22" fill="#BF9A2D" opacity="0.9" text-anchor="start">
    Unity, Culture, Development
  </text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="5" fill="#BF9A2D" opacity="0.6"/>
  <circle cx="1100" cy="100" r="5" fill="#BF9A2D" opacity="0.6"/>
  <circle cx="100" cy="530" r="5" fill="#BF9A2D" opacity="0.6"/>
  <circle cx="1100" cy="530" r="5" fill="#BF9A2D" opacity="0.6"/>
</svg>
